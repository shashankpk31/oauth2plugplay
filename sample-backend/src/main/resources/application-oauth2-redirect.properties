# =====================================================
# OAuth2 Redirect Mode Configuration
# Enable this profile to use standard OAuth2 authorization code flow
# =====================================================

# Disable Custom Login - User is redirected to provider's login page
oauth2.custom-login-enabled=false

# This mode uses Authorization Code Grant (Standard OAuth2)
# User is redirected to OAuth2 provider (Keycloak) for authentication
# Provider redirects back with authorization code
# Backend exchanges code for tokens
