# Application Configuration
spring.application.name=sample-backend
server.port=8081

# =====================================================
# OAuth2/OIDC Configuration using oidcplugplay
# =====================================================

# Enable OAuth2 auto-configuration
oauth2.enabled=true

# Provider: KEYCLOAK, OKTA, GOOGLE, META, GITHUB, MICROSOFT, CUSTOM
oauth2.provider=KEYCLOAK

# Keycloak Configuration
# Update these values after setting up Keycloak
oauth2.client-id=sample-app
oauth2.client-secret=MRpetcERkgDyjXI5sRcym9j6YywqfEUx

# Keycloak Issuer URI (Update realm name if different)
# Format: http://localhost:8080/realms/{realm-name}
oauth2.issuer-uri=http://localhost:8180/realms/sample-realm

# OAuth2 Scopes
oauth2.scopes=openid,profile,email

# Enable Custom Login (username/password authentication)
# Set to false to use standard OAuth2 flow with Keycloak's login page
oauth2.custom-login-enabled=false

# JWT Configuration
oauth2.jwt.validate-issuer=true
oauth2.jwt.validate-audience=false
oauth2.jwt.access-token-validity=3600
oauth2.jwt.refresh-token-validity=86400

# CORS Configuration
oauth2.cors.enabled=true
oauth2.cors.allowed-origins=http://localhost:5173,http://localhost:3000
oauth2.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
oauth2.cors.allowed-headers=*
oauth2.cors.allow-credentials=true

# =====================================================
# Logging Configuration
# =====================================================
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.com.shashankpk.oauth2.starter=DEBUG
logging.level.org.springframework.security=DEBUG

# =====================================================
# Actuator Configuration
# =====================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
