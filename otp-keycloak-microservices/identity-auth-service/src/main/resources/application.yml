spring:
  application:
    name: identity-auth-service

  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/myrealm
          jwk-set-uri: http://localhost:8180/realms/myrealm/protocol/openid-connect/certs

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}
  realm: ${KEYCLOAK_REALM:myrealm}
  client-id: ${KEYCLOAK_CLIENT_ID:backend-service}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}
  admin-username: ${KEYCLOAK_SERVICE_USERNAME}
  admin-password: ${KEYCLOAK_SERVICE_PASSWORD}

otp:
  expiry-minutes: 5
  max-attempts: 3
  length: 6

mpin:
  length: 4  # MPIN length (4-6 digits recommended)
  min-length: 4
  max-length: 6
  session-expiry-days: 30  # MPIN session expires after 30 days (like bank apps)
  max-attempts: 3  # Maximum failed MPIN attempts before blocking
  encryption:
    key: ${MPIN_ENCRYPTION_KEY}  # AES-256 encryption key from environment

server:
  port: 8082

logging:
  level:
    root: INFO
    com.auth.identity: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
