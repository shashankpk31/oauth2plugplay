spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:
        routes:
          # Public routes (no authentication required)
          - id: auth-public
            uri: http://localhost:8082
            predicates:
              - Path=/auth/register,/auth/otp/send,/auth/otp/verify,/auth/refresh,/auth/mpin/login

          # Protected auth routes
          - id: auth-protected
            uri: http://localhost:8082
            predicates:
              - Path=/auth/**

          # Business service routes (all protected)
          - id: business-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:3000"
              - "http://localhost:19006"
              - "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/myrealm
          jwk-set-uri: http://localhost:8180/realms/myrealm/protocol/openid-connect/certs

server:
  port: 8081

logging:
  level:
    root: INFO
    com.auth.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
