spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Public routes (no authentication required)
        - id: auth-public
          uri: http://localhost:8082
          predicates:
            - Path=/auth/register,/auth/otp/send,/auth/otp/verify,/auth/refresh
          filters:
            - StripPrefix=0

        # Protected auth routes
        - id: auth-protected
          uri: http://localhost:8082
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0
            - name: JwtAuthenticationFilter

        # Business service routes (all protected)
        - id: business-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=0
            - name: JwtAuthenticationFilter

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:19006"
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/myrealm
          jwk-set-uri: http://localhost:8180/realms/myrealm/protocol/openid-connect/certs

server:
  port: 8081

logging:
  level:
    root: INFO
    com.auth.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
