spring.application.name=oauth2-oidc-spring-boot-starter

# OAuth2/OIDC Spring Boot Starter - Default Configuration
# These are default values - override them in your application

# Logging
logging.level.com.shashankpk.oauth2.starter=INFO
logging.level.org.springframework.security=INFO

# OAuth2 Configuration (Must be overridden in consuming application)
# oauth2.enabled=true
# oauth2.provider=KEYCLOAK
# oauth2.client-id=your-client-id
# oauth2.client-secret=your-client-secret
# oauth2.issuer-uri=http://localhost:8080/realms/your-realm
# oauth2.custom-login-enabled=false
